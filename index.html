#root{height:100%;display:flex;flex-direction:column;position:relative}

.settings-btn{width:44px;height:44px;border-radius:50%;background:var(--surface);border:none;box-shadow:var(--shadow);display:flex;justify-content:center;align-items:center;cursor:pointer;color:var(--accent);transition:transform .1s;}

.debt-banner{background:var(--accent);border-radius:var(--r);padding:16px 20px;margin-bottom:16px;animation:slide-up .3s ease;overflow:hidden;position:relative;}
.debt-banner::before{content:'';position:absolute;top:-20px;right:-20px;width:90px;height:90px;background:rgba(255,255,255,0.07);border-radius:50%;}
.debt-banner::after{content:'';position:absolute;bottom:-30px;right:20px;width:70px;height:70px;background:rgba(255,255,255,0.05);border-radius:50%;}

.pay-now-btn{width:100%;padding:12px;border-radius:30px;border:2px solid rgba(255,255,255,0.5);background:transparent;color:#fff;font-family:'Kanit';font-size:15px;font-weight:800;cursor:pointer;margin-top:12px;letter-spacing:0.02em;transition:all 0.15s;}
.pay-now-btn:active{background:rgba(255,255,255,0.15);}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--ink-dark);color:#fff;padding:12px 24px;border-radius:30px;font-size:14px;font-weight:500;z-index:999;animation:pop .2s ease;white-space:nowrap;}
@keyframes pop{0%{opacity:0;transform:scale(0.9) translateX(-50%);}100%{opacity:1;transform:scale(1) translateX(-50%);}}
@keyframes slide-up{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}

/* Tailwind custom placeholder opacity patch */
