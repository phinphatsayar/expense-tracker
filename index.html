<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>ทริปของเรา - SplitTrip</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Kanit',sans-serif;background:#FBF6F2;color:#770523}

:root{
  --bg-main:#FBF6F2;
  --bg-pink:#FAD2E1;
  --surface:#FFFFFF;
  --accent:#770523;
  --accent-light:#F9E8EC;
  --ink-dark:#3A0211;
  --ink-mid:#770523;
  --ink-light:#A65368;
  --green:#2E7D5E;
  --green-light:#EAF5F0;
  --shadow:0 4px 16px rgba(119, 5, 35, 0.08);
  --r:24px; --rs:14px;
}

#root{height:100%;display:flex;flex-direction:column;position:relative}
.app-container{flex:1;overflow-y:auto;padding-bottom:120px;-webkit-overflow-scrolling:touch;background:linear-gradient(180deg, var(--bg-main) 0%, var(--bg-main) 120px, var(--bg-pink) 120px, var(--bg-pink) 100%);}
.app-container::-webkit-scrollbar{display:none}

/* --- Top Header (Bubble & Settings) --- */
.top-header { padding: 24px 20px 10px; display: flex; justify-content: space-between; align-items: flex-start; background: var(--bg-main); }
.bubble-chat { background: var(--surface); padding: 12px 20px; border-radius: 30px; border-bottom-left-radius: 8px; box-shadow: var(--shadow); cursor: pointer; display: inline-block; animation: pop .3s ease; border: 1px solid rgba(119,5,35,0.05); }
.bubble-hi { font-weight: 800; font-size: 16px; color: var(--accent); line-height: 1.2; }
.bubble-sub { font-size: 13px; color: var(--ink-light); font-weight: 500; }
.settings-btn { width: 48px; height: 48px; border-radius: 50%; background: var(--surface); border: none; box-shadow: var(--shadow); display: flex; justify-content: center; align-items: center; cursor: pointer; color: var(--accent); transition: transform .1s; }
.settings-btn:active { transform: scale(0.95); }
.settings-btn svg { width: 24px; height: 24px; stroke-width: 2; }

/* --- Trip Title --- */
.trip-header { padding: 10px 20px 24px; background: var(--bg-main); }
.trip-title { font-size: 22px; font-weight: 800; color: var(--ink-dark); display: flex; align-items: center; gap: 8px; cursor: pointer; }
.trip-sub { font-size: 13px; color: var(--ink-light); font-weight: 500; margin-top: 4px; }

/* --- Content Areas --- */
.content-area { padding: 0 20px; }
.sec-card { background: var(--surface); border-radius: var(--r); box-shadow: var(--shadow); padding: 20px; margin-bottom: 16px; animation: slide-up .3s ease; }


/* --- Buttons & Inputs --- */
.pill-btn { background: var(--surface); color: var(--accent); border: 1.5px solid rgba(119,5,35,0.1); padding: 6px 16px; border-radius: 20px; font-weight: 700; font-size: 14px; cursor: pointer; font-family: 'Kanit'; }
.pill-btn:active { background: var(--accent-light); }
.btn-main { background: var(--accent); color: #fff; border: none; padding: 14px 20px; border-radius: var(--rs); font-weight: 700; font-size: 16px; width: 100%; cursor: pointer; font-family: 'Kanit'; }
input, select, textarea { width: 100%; padding: 12px 16px; border: 1.5px solid rgba(119,5,35,0.2); border-radius: var(--rs); font-family: 'Kanit'; font-size: 15px; color: var(--ink-dark); outline: none; transition: border-color .2s; }
input:focus, select:focus { border-color: var(--accent); }
.input-group { display: flex; gap: 8px; align-items: center; }

/* --- Splits Chips (Image 10) --- */
.split-chip-group { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 24px; }
.split-chip { display: flex; align-items: center; gap: 8px; border-radius: 20px; border: 1.5px solid rgba(119,5,35,0.1); padding: 8px 16px; font-family: 'Kanit'; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.split-chip.off { background: var(--surface); color: var(--ink-dark); border-color: rgba(119,5,35,0.1); }
.split-chip.on { background: var(--bg-pink); color: var(--accent); border-color: var(--accent); }
.split-chip svg { width: 20px; height: 20px; }
.split-chip.on svg { fill: var(--accent); }
.split-chip.off svg { fill: var(--ink-dark); }

/* --- Add Member Row --- */
.add-mem-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.paw-btn { width: 44px; height: 44px; border-radius: 12px; background: #FBF6F2; border: 1.5px solid rgba(119,5,35,0.15); display: flex; justify-content: center; align-items: center; cursor: pointer; color: var(--accent); flex-shrink:0;}
.paw-btn svg { width: 22px; height: 22px; fill: currentColor; }

/* --- Bottom Nav (Image 8 style) --- */
.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top-left-radius: 30px; border-top-right-radius: 30px; box-shadow: 0 -4px 24px rgba(0,0,0,0.06); display: flex; justify-content: space-around; align-items: center; padding: 12px 20px 24px; z-index: 100; }
.nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; background: none; border: none; color: var(--ink-light); font-family: 'Kanit'; cursor: pointer; width: 80px; }
.nav-item.active { color: var(--accent); font-weight: 700; }
.nav-item svg { width: 26px; height: 26px; stroke-width: 2.5; }
.nav-item span { font-size: 12px; font-weight: 600; }
.fab-container { position: relative; top: -24px; }
.fab-btn { width: 64px; height: 64px; border-radius: 50%; background: var(--bg-pink); border: 4px solid var(--surface); box-shadow: 0 8px 16px rgba(250, 210, 225, 0.6); display: flex; justify-content: center; align-items: center; font-size: 32px; color: var(--surface); cursor: pointer; font-weight: 300; }

/* --- Members & Totals --- */
.mem-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid rgba(119,5,35,0.05); cursor: pointer;}
.mem-item:last-child { border-bottom: none; padding-bottom: 0; }
.av-sq { width: 40px; height: 40px; border-radius: 10px; background: var(--green-light); color: var(--green); display: flex; justify-content: center; align-items: center; font-weight: 700; font-size: 18px; }

/* --- Total Card --- */
.total-label { font-size: 16px; font-weight: 800; color: var(--accent); margin-bottom: 12px; }
.total-row { display: flex; justify-content: space-between; align-items: center; padding-top: 12px; border-top: 1px solid rgba(119,5,35,0.1); }
.badge { display: inline-flex; align-items: center; background: var(--accent-light); color: var(--accent); padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; }

/* --- Utilities --- */
.lbl { font-size: 13px; font-weight: 700; color: var(--ink-light); margin-bottom: 6px; }
.toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: var(--ink-dark); color: #fff; padding: 12px 24px; border-radius: 30px; font-size: 14px; font-weight: 500; z-index: 999; animation: pop .2s ease; }
@keyframes pop { 0% { opacity: 0; transform: scale(0.9) translateX(-50%); } 100% { opacity: 1; transform: scale(1) translateX(-50%); } }
@keyframes slide-up { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
.modal-bg { position: fixed; inset: 0; background: rgba(58,2,17,0.5); z-index: 200; display: flex; align-items: flex-end; }
.modal { background: var(--bg-main); width: 100%; max-height: 90vh; border-radius: 30px 30px 0 0; padding: 24px 20px 40px; overflow-y: auto; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">

const {useState, useEffect, useCallback}=React;
const KEY='splittrip-v6';
const MY_KEY='splittrip-myname-v6';

// อัตราแลกเปลี่ยนจำลอง (ใช้อ้างอิงตอนแปลงสกุลเงินทั้งหมด)
const RATES = { THB: 35, USD: 1, EUR: 0.92, JPY: 150, SGD: 1.34, GBP: 0.79, CNY: 7.2, KRW: 1330, AUD: 1.52, MYR: 4.7 };

const CURRENCIES=[
  {code:'THB',sym:'฿',name:'บาทไทย'},{code:'USD',sym:'$',name:'ดอลลาร์สหรัฐ'},
  {code:'EUR',sym:'€',name:'ยูโร'},{code:'JPY',sym:'¥',name:'เยนญี่ปุ่น'},
  {code:'KRW',sym:'₩',name:'วอนเกาหลี'}
];

const CATEGORIES = ['Food', 'Accommodation', 'Transport', 'Ticket', 'Shopping', 'Settlement', 'Other'];

const getCur=code=>CURRENCIES.find(x=>x.code===code)||CURRENCIES[0];
const fmtAmt=(n,code)=>{ const c=getCur(code); const dec=(code==='JPY'||code==='KRW')?0:2; return c.sym+Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:dec,maximumFractionDigits:dec}); };

const initData=()=>({tripName:"Where's the squad wandering next...?",members:[],expenses:[],displayCurrency:'THB', lang: 'th'});
const loadData=()=>JSON.parse(localStorage.getItem(KEY))||initData();
const persist=d=>localStorage.setItem(KEY,JSON.stringify(d));
const today=()=>new Date().toISOString().slice(0,10);

// คำนวณยอด
function calcBal(members,expenses,displayCurrency){
  const paid={},owe={}, net={};
  members.forEach(m=>{paid[m]=0;owe[m]=0;net[m]=0});
  expenses.forEach(e=>{
    if((e.currency||'THB')!==displayCurrency) return;
    if(paid[e.payer]!==undefined) paid[e.payer]+=e.amount;
    Object.entries(e.splits).forEach(([n,v])=>{if(owe[n]!==undefined)owe[n]+=v});
  });
  members.forEach(m=>{net[m]=(paid[m]||0)-(owe[m]||0)});
  return {paid,owe,net};
}

function calcSettle(net){
  const cr=[],db=[];
  Object.entries(net).forEach(([n,v])=>{ const val = Math.round(v*100)/100; if(val>0)cr.push({n,a:val}); if(val<0)db.push({n,a:-val}); });
  cr.sort((a,b)=>b.a-a.a); db.sort((a,b)=>b.a-a.a);
  const r=[]; let ci=0,di=0;
  while(ci<cr.length&&di<db.length){
    const amt=Math.min(cr[ci].a,db[di].a);
    if(amt>0) r.push({from:db[di].n, to:cr[ci].n, amount:Math.round(amt*100)/100});
    cr[ci].a-=amt; db[di].a-=amt;
    if(cr[ci].a<=0.01)ci++; if(db[di].a<=0.01)di++;
  }
  return r;
}

// Icons
const I={
  gear:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>,
  paw:<svg viewBox="0 0 24 24"><path d="M12 8.5c-1.5 0-2.7-1.4-2.7-3.2S10.5 2 12 2s2.7 1.4 2.7 3.2-1.2 3.3-2.7 3.3zM6.5 12c-1.4 0-2.5-1.5-2.5-3.5S5.1 5 6.5 5 9 6.5 9 8.5 7.9 12 6.5 12zm11 0c-1.4 0-2.5-1.5-2.5-3.5S16.1 5 17.5 5 20 6.5 20 8.5 18.9 12 17.5 12zm-5.5 10c-3.8 0-5.5-2-6-4.5-.3-1.5.5-2.5 1.5-3.5 1.5-1.5 3-2 4.5-2s3 .5 4.5 2c1 1 1.8 2 1.5 3.5-.5 2.5-2.2 4.5-6 4.5z"/></svg>,
  home:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
  list:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="16" y2="14"/><line x1="8" y1="18" x2="16" y2="18"/></svg>,
  back:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>,
  edit:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" style={{width:16,height:16}}><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
};

// Placeholder Image Component (ชั่วคราว)
function PlaceholderImage({ size = 40, rounded = 'var(--rs)' }) {
  return (
    <div
      style={{
        width: size,
        height: size,
        borderRadius: rounded,
        border: '1.5px solid #2ECC71', // สีเขียวชั่วคราว
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'center',
        color: '#2ECC71',
        fontSize: 10,
        fontWeight: 600,
        backgroundColor: 'rgba(46, 204, 113, 0.05)', // สีเขียวอ่อนชั่วคราว
      }}
    >
      IMG
    </div>
  );
}

// New Splits Icon Component (Image 10)
function NewSplitsIcon({ color = 'currentColor' }) {
  return (
    <svg className="new-splits-icon" viewBox="0 0 24 24" fill={color}>
      <circle cx="12" cy="12" r="10" />
    </svg>
  );
}

// New Arrow Icon Component (Image 11)
function NewArrowIcon({ color = 'currentColor' }) {
  return (
    <svg width="18" height="12" viewBox="0 0 18 12" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0 6H16.5M16.5 6L11.5 1M16.5 6L11.5 11" stroke={color} stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
    </svg>
  );
}


/* ── Components ── */
function useToast(){
  const [t,setT]=useState(null);
  return [t, msg=>{setT(msg);setTimeout(()=>setT(null),2000)}];
}

/* ── Tab: Home ── */
function HomeTab({data, upd, toast, myName, onChangeName, setTab, onSelectMember}){
  const [addMode, setAdd]=useState(false);
  const [nm, setNm]=useState('');
  const {members, expenses, displayCurrency, tripName}=data;

  const {paid, net}=calcBal(members, expenses, displayCurrency);
  const totalAmt = expenses.filter(e=>e.currency===displayCurrency && e.category!=='Settlement').reduce((s,e)=>s+e.amount,0);

  const addM=()=>{
    const n=nm.trim(); if(!n) return;
    if(members.includes(n)) return toast('มีชื่อนี้แล้ว!');
    upd(d=>{d.members=[...d.members,n]; return d;}); setNm(''); setAdd(false); toast(`เพิ่ม ${n} แล้ว ✓`);
  };

  const editTrip=()=>{
    const n = prompt('ตั้งชื่อทริปใหม่:', tripName);
    if(n&&n.trim()) upd(d=>{d.tripName=n.trim(); return d;});
  }

  return <div className="app-container">
    <div className="top-header">
      <div className="bubble-chat" onClick={onChangeName}>
        <div className="bubble-hi">Hello!</div>
        <div className="bubble-sub">{myName || 'Pop your nickname here!'}</div>
      </div>
      <button className="settings-btn" onClick={()=>setTab('settings')}>{I.gear}</button>
    </div>
    
    <div className="trip-header">
      <div className="trip-title" onClick={editTrip}>{tripName} {I.edit}</div>
      <div className="trip-sub">{members.length} member · {expenses.length} transaction</div>
    </div>

    <div className="content-area">
      {/* Member Section */}
      <div className="sec-card">
        <div className="add-mem-row">
          <div style={{fontWeight:800, fontSize:16}}>Member</div>
          {addMode ? <button className="pill-btn" style={{border:'none', color:'var(--ink-light)'}} onClick={()=>setAdd(false)}>Cancel</button> 
                   : <button className="pill-btn" onClick={()=>setAdd(true)}>+ Add</button>}
        </div>
        
        {addMode && (
          <div className="input-group" style={{marginBottom: 16}}>
            <input placeholder="Member name" value={nm} onChange={e=>setNm(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addM()} autoFocus/>
            <button className="paw-btn" onClick={addM}>{I.paw}</button>
          </div>
        )}

        {members.length===0 && !addMode && (
          <div style={{textAlign:'center', padding:'20px 0', color:'var(--ink-light)', fontSize:13}}>
            <PlaceholderImage rounded="10px" />
            <div style={{opacity:0.6, marginTop:8}}>Add members to get started {I.paw}</div>
          </div>
        )}

        {members.map(m=>(
          <div key={m} className="mem-item" onClick={()=>onSelectMember(m)}>
            <div className="av-sq" style={{background: m===myName?'var(--accent-light)':'#FBF6F2', color: m===myName?'var(--accent)':'var(--ink-light)'}}>{m[0].toUpperCase()}</div>
            <div style={{flex:1}}>
              <div style={{fontWeight:700, fontSize:15, color:'var(--ink-dark)'}}>{m}</div>
              <div style={{fontSize:12, color:'var(--ink-light)'}}>spent {fmtAmt(paid[m]||0, displayCurrency)}</div>
            </div>
            <div style={{color:'var(--ink-light)'}}>&gt;</div>
          </div>
        ))}
      </div>

      {/* Total Section */}
      {expenses.length>0 && (
        <div className="sec-card">
          <div className="total-label">Total</div>
          <div className="total-row">
            <span className="badge">{displayCurrency}</span>
            <span style={{fontSize:20, fontWeight:800, color:'var(--ink-dark)'}}>{fmtAmt(totalAmt, displayCurrency)}</span>
          </div>
        </div>
      )}
    </div>
  </div>;
}

/* ── Tab: Add/Edit Expense ── */
function AddTab({data, upd, toast, goBack, editingExp}){
  const {members, displayCurrency}=data;
  const isEdit = !!editingExp;
  
  const [desc,setDesc]=useState(isEdit?editingExp.desc:'');
  const [amt,setAmt]=useState(isEdit?editingExp.amount:'');
  const [cat,setCat]=useState(isEdit?editingExp.category:'Food');
  const [payer,setPayer]=useState(isEdit?editingExp.payer:(members[0]||''));
  const [sel,setSel]=useState({});

  useEffect(()=>{
    const s={}; 
    if(isEdit) { members.forEach(m=>{ s[m] = !!editingExp.splits[m]; }); }
    else { members.forEach(m=>{ s[m] = true; }); }
    setSel(s);
  },[members, isEdit]);

  if(members.length<2) return <div className="app-container"><div className="content-area" style={{marginTop:40, textAlign:'center'}}>ต้องมีสมาชิกอย่างน้อย 2 คนก่อน</div></div>;

  const submit=()=>{
    const active = members.filter(m=>sel[m]);
    const a = parseFloat(amt);
    if(!desc.trim()) return toast('กรุณาใส่รายละเอียด');
    if(!a || a<=0) return toast('ใส่จำนวนเงิน');
    if(!payer) return toast('เลือกคนจ่าย');
    if(active.length===0) return toast('เลือกคนหารด้วย');

    const each = a / active.length;
    const splits = {}; active.forEach(m=>splits[m]=each);

    const expObj = { id: isEdit?editingExp.id:Date.now(), desc:desc.trim(), amount:a, currency:displayCurrency, category:cat, payer, splits, date:today() };

    if(isEdit){
      upd(d=>{ d.expenses = d.expenses.map(e=>e.id===expObj.id ? expObj : e); return d; });
      toast('แก้ไขรายการแล้ว');
    } else {
      upd(d=>{ d.expenses = [expObj, ...d.expenses]; return d; });
      toast('บันทึกแล้ว');
    }
    goBack();
  };

  const del=()=>{
    if(confirm('ลบรายการนี้?')){ upd(d=>{d.expenses=d.expenses.filter(e=>e.id!==editingExp.id); return d;}); toast('ลบแล้ว'); goBack(); }
  };

  return <div className="app-container" style={{background:'var(--bg-main)'}}>
    <div className="top-header" style={{alignItems:'center'}}>
      <button className="pill-btn" style={{display:'flex',gap:6,alignItems:'center'}} onClick={goBack}>{I.back} Back</button>
      <div style={{fontWeight:800, fontSize:18}}>{isEdit?'Edit':'Add'} Transaction</div>
      <div style={{width:80}}></div>
    </div>

    <div className="content-area" style={{paddingTop:20}}>
      <div className="sec-card">
        <PlaceholderImage rounded="10px" />
        <div style={{height: 10}} />
        <div className="lbl">หมวดหมู่ (Category)</div>
        <select value={cat} onChange={e=>setCat(e.target.value)} style={{marginBottom:16}}>
          {CATEGORIES.filter(c=>c!=='Settlement').map(c=><option key={c} value={c}>{c}</option>)}
        </select>

        <div className="lbl">รายละเอียด</div>
        <input placeholder="เช่น ค่าอาหาร..." value={desc} onChange={e=>setDesc(e.target.value)} style={{marginBottom:16}}/>

        <div className="lbl">จำนวนเงิน ({displayCurrency})</div>
        <input type="number" inputMode="decimal" placeholder="0.00" value={amt} onChange={e=>setAmt(e.target.value)} style={{marginBottom:16}}/>

        <div className="lbl">ใครเป็นคนจ่าย?</div>
        <select value={payer} onChange={e=>setPayer(e.target.value)} style={{marginBottom:16}}>
          {members.map(m=><option key={m} value={m}>{m}</option>)}
        </select>

        <div className="lbl">หารกับใครบ้าง?</div>
        <div className="split-chip-group">
          {members.map(m=>{
            const isSelected = sel[m];
            return (
              <button key={m} onClick={()=>setSel(s=>({...s,[m]:!s[m]}))} className={`split-chip ${isSelected ? 'on' : 'off'}`}>
                <NewSplitsIcon color={isSelected ? 'var(--accent)' : 'var(--ink-dark)'} />
                {m}
              </button>
            );
          })}
        </div>

        <button className="btn-main" onClick={submit}>บันทึก</button>
        {isEdit && <button className="pill-btn" style={{width:'100%', marginTop:12, color:'white', background:'#A65368'}} onClick={del}>ลบรายการนี้</button>}
      </div>
    </div>
  </div>;
}

/* ── Tab: Transaction List ── */
function ListTab({data, setEditingExp, goBack}){
  const {expenses, displayCurrency} = data;
  const exps = expenses.filter(e=>e.category !== 'Settlement'); // ซ่อนรายการโอนเงินจ่ายหนี้
  
  return <div className="app-container" style={{background:'var(--bg-main)'}}>
    <div className="top-header">
       <div style={{fontWeight:800, fontSize:24, color:'var(--ink-dark)'}}>Transactions</div>
    </div>
    <div className="content-area" style={{paddingTop:10}}>
      {exps.length===0 && <div style={{textAlign:'center', marginTop:40, color:'var(--ink-light)'}}>ยังไม่มีรายการ</div>}
      {exps.map(e=>(
        <div key={e.id} className="sec-card" style={{padding:'16px', cursor:'pointer'}} onClick={()=>setEditingExp(e)}>
          <div style={{display:'flex', justifyContent:'space-between', marginBottom:6}}>
            <div style={{fontWeight:700, fontSize:16, color:'var(--ink-dark)'}}>{e.desc}</div>
            <div style={{fontWeight:800, fontSize:16}}>{fmtAmt(e.amount, e.currency)}</div>
          </div>
          <div style={{display:'flex', justifyContent:'space-between', fontSize:13, color:'var(--ink-light)'}}>
            <div><span className="badge" style={{padding:'2px 8px'}}>{e.category}</span></div>
            <div>{e.payer} จ่าย</div>
          </div>
        </div>
      ))}
    </div>
  </div>;
}

/* ── Member Detail & Settlements ── */
function MemberDetail({member, data, upd, toast, goBack}){
  const {members, expenses, displayCurrency}=data;
  const {net} = calcBal(members, expenses, displayCurrency);
  const settles = calcSettle(net).filter(s=>s.from===member || s.to===member);
  const n = net[member]||0;

  // ฟังก์ชันกด "จ่ายแล้ว" สร้าง Transaction ประเภท Settlement เพื่อหักล้างหนี้
  const markAsPaid = (s) => {
    if(confirm(`ยืนยันว่า ${s.from} จ่ายให้ ${s.to} จำนวน ${fmtAmt(s.amount, displayCurrency)} แล้ว?`)){
       upd(d=>{
         d.expenses.push({ id:Date.now(), desc:`โอนเงินเคลียร์หนี้`, amount:s.amount, currency:displayCurrency, category:'Settlement', payer:s.from, splits:{[s.to]: s.amount}, date:today() });
         return d;
       });
       toast('บันทึกการจ่ายเงินแล้ว ✓');
    }
  };

  return <div className="app-container" style={{background:'var(--bg-main)', zIndex:200, position:'absolute', top:0, left:0, right:0, bottom:0}}>
     <div className="top-header" style={{alignItems:'center'}}>
      <button className="pill-btn" style={{display:'flex',gap:6,alignItems:'center'}} onClick={goBack}>{I.back} Back</button>
      <div style={{width:80}}></div>
    </div>
    <div className="content-area" style={{paddingTop:10}}>
       <div style={{display:'flex', alignItems:'center', gap:16, marginBottom:24}}>
          <div className="av-sq" style={{width:60, height:60, fontSize:24, background:'var(--surface)', border:'2px solid var(--accent)'}}>{member[0]}</div>
          <PlaceholderImage rounding="10px" />
          <div>
            <div style={{fontSize:24, fontWeight:800, color:'var(--ink-dark)'}}>{member}</div>
            <div style={{fontSize:14, fontWeight:600, color: n>0?'var(--green)':'var(--accent)'}}>
               {n>0.01 ? `คนอื่นค้างอยู่ ${fmtAmt(n, displayCurrency)}` : n<-0.01 ? `ต้องจ่ายเพื่อน ${fmtAmt(-n, displayCurrency)}` : 'เคลียร์หนี้หมดแล้ว 🎉'}
            </div>
          </div>
       </div>

       {settles.length>0 && <div className="sec-card" style={{background:'var(--bg-pink)'}}>
          <div className="lbl" style={{color:'var(--ink-dark)', fontSize:14, marginBottom:12}}>💸 ต้องโอน / รับโอน ({displayCurrency})</div>
          {settles.map((s,i)=>{
            const isFrom = s.from === member;
            return <div key={i} style={{background:'var(--surface)', padding:'12px 16px', borderRadius:16, marginBottom:8}}>
               <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8}}>
                  <div style={{fontSize:14, fontWeight:600, display:'flex', alignItems:'center', gap:6}}>
                    {isFrom ? (
                        <span style={{color:'var(--accent)', display:'flex', alignItems:'center', gap: 6}}>
                            จ่ายให้ <NewArrowIcon color="var(--accent)" /> {s.to}
                        </span>
                    ) : (
                        <span style={{color:'var(--green)', display:'flex', alignItems:'center', gap: 6}}>
                            รับจาก <NewArrowIcon color="var(--green)" /> {s.from}
                        </span>
                    )}
                  </div>
                  <div style={{fontSize:16, fontWeight:800}}>{fmtAmt(s.amount, displayCurrency)}</div>
               </div>
               <button className="pill-btn" style={{width:'100%', fontSize:12, padding:'8px', background: isFrom?'var(--accent)':'var(--green)', color:'white', border:'none'}} onClick={()=>markAsPaid(s)}>
                  {isFrom ? 'กดเมื่อโอนเงินแล้ว' : 'กดเมื่อได้รับเงินแล้ว'}
               </button>
            </div>
          })}
       </div>}
    </div>
  </div>;
}

/* ── Settings Tab ── */
function SettingsModal({data, upd, goBack, myName, onChangeName, toast}){
  const {displayCurrency} = data;
  
  const handleCurChange = (e) => {
    const newCur = e.target.value;
    if(newCur === displayCurrency) return;
    
    // ระบบแปลงสกุลเงิน
    if(confirm(`คุณต้องการแปลงยอดเงินของ "ทุกรายการ" เป็น ${newCur} ด้วยอัตราแลกเปลี่ยนโดยประมาณหรือไม่?\n\n*หากยกเลิก จะเปลี่ยนแค่สัญลักษณ์ แต่ไม่แปลงตัวเลข*`)){
       const rateFrom = RATES[displayCurrency] || 1;
       const rateTo = RATES[newCur] || 1;
       
       upd(d=>{
         d.expenses = d.expenses.map(exp => {
            const convert = amt => (amt / rateFrom) * rateTo;
            const newSplits = {};
            Object.keys(exp.splits).forEach(k => newSplits[k] = convert(exp.splits[k]));
            return {...exp, currency: newCur, amount: convert(exp.amount), splits: newSplits};
         });
         d.displayCurrency = newCur;
         return d;
       });
       toast(`แปลงทุกยอดเป็น ${newCur} แล้ว`);
    } else {
       upd(d=>{ d.displayCurrency = newCur; return d; });
    }
  };

  return <div className="modal-bg">
    <div className="modal">
       <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20}}>
          <div style={{fontSize:20, fontWeight:800}}>Settings</div>
          <button className="pill-btn" onClick={goBack}>Close</button>
       </div>

       <div className="lbl">ภาษา (Language)</div>
       <select value={data.lang || 'th'} onChange={e => upd(d => { d.lang = e.target.value; return d; })} style={{marginBottom: 20, background:'var(--surface)'}}>
          <option value="en">English</option>
          <option value="th">ไทย</option>
       </select>

       <div className="lbl">ชื่อของคุณ</div>
       <div className="input-group" style={{marginBottom: 20}}>
          <input value={myName} readOnly onClick={onChangeName} placeholder="แตะเพื่อตั้งชื่อ..." style={{background:'var(--surface)'}}/>
       </div>

       <div className="lbl">สกุลเงินหลัก (พร้อมระบบแปลงค่า)</div>
       <select value={displayCurrency} onChange={handleCurChange} style={{marginBottom: 30, background:'var(--surface)'}}>
          {CURRENCIES.map(c=><option key={c.code} value={c.code}>{c.code} - {c.name}</option>)}
       </select>

       <button className="pill-btn" style={{width:'100%', padding:'12px', color:'white', background:'#A65368'}} onClick={()=>{if(confirm('ลบข้อมูลทั้งหมด?')) upd(()=>initData()); goBack();}}>
          ลบข้อมูลทริปทั้งหมด (Reset)
       </button>
    </div>
  </div>;
}

/* ── App Container ── */
function App(){
  const [data,setData]=useState(loadData);
  const [tab,setTab]=useState('home'); // home, add, list, settings
  const [memberDetail,setMemberDetail]=useState(null);
  const [editingExp, setEditingExp]=useState(null);
  const [myName,setMyName]=useState(()=>localStorage.getItem(MY_KEY)||'');
  const [toast,showToast]=useToast();

  useEffect(()=>persist(data),[data]);
  useEffect(()=>localStorage.setItem(MY_KEY,myName),[myName]);
  const upd=fn=>setData(prev=>fn({...prev}));

  const changeName=()=>{const n=prompt('ชื่อของคุณ:',myName); if(n!==null) setMyName(n.trim());};

  return <div id="root">
    {/* Routing Logic */}
    {tab==='home' && !memberDetail && <HomeTab data={data} upd={upd} toast={showToast} myName={myName} onChangeName={changeName} setTab={setTab} onSelectMember={setMemberDetail}/>}
    {tab==='add' && <AddTab data={data} upd={upd} toast={showToast} goBack={()=>setTab('home')} editingExp={null}/>}
    {tab==='edit' && <AddTab data={data} upd={upd} toast={showToast} goBack={()=>{setTab('list'); setEditingExp(null)}} editingExp={editingExp}/>}
    {tab==='list' && <ListTab data={data} setEditingExp={e=>{setEditingExp(e); setTab('edit');}}/>}
    
    {memberDetail && <MemberDetail member={memberDetail} data={data} upd={upd} toast={showToast} goBack={()=>setMemberDetail(null)}/>}
    {tab==='settings' && <SettingsModal data={data} upd={upd} goBack={()=>setTab('home')} myName={myName} onChangeName={changeName} toast={showToast}/>}

    {toast && <div className="toast">{toast}</div>}

    {/* Bottom Navigation (Hides on Add/Edit screens to give space) */}
    {(tab==='home' || tab==='list') && !memberDetail && (
      <nav className="bottom-nav">
        <button className={`nav-item ${tab==='home'?'active':''}`} onClick={()=>setTab('home')}>{I.home}<span>Home</span></button>
        <div className="fab-container"><button className="fab-btn" onClick={()=>setTab('add')}>+</button></div>
        <button className={`nav-item ${tab==='list'?'active':''}`} onClick={()=>setTab('list')}>{I.list}<span>Transaction</span></button>
      </nav>
    )}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
