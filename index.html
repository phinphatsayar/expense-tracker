*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Kanit',sans-serif;background:#FFFFFF;color:#770523}

:root{
  --bg-main:#FFFFFF;
  --bg-pink:#FAD2E1;
  --surface:#FFFFFF;
  --accent:#770523;
  --accent-light:#F9E8EC;

}

#root{height:100%;display:flex;flex-direction:column;position:relative}
.app-container{flex:1;overflow-y:auto;padding-bottom:120px;-webkit-overflow-scrolling:touch;background:var(--bg-main);}
.app-container::-webkit-scrollbar{display:none}

.inline-input{border:1px dashed var(--ink-light);background:rgba(255,255,255,0.5);padding:4px 8px;border-radius:8px;font-family:inherit;font-size:inherit;font-weight:inherit;color:inherit;width:100%;outline:none;}
.inline-input:focus{border:1px solid var(--accent);background:var(--surface);}

.top-header{padding:24px 20px 20px;display:flex;justify-content:space-between;align-items:flex-start;background:var(--bg-main);}
.bubble-chat{background:var(--surface);padding:12px 20px;border-radius:30px;border-bottom-left-radius:8px;box-shadow:var(--shadow);cursor:pointer;display:inline-block;animation:pop .3s ease;border:1px solid rgba(119,5,35,0.05);}
.bubble-hi{font-weight:800;font-size:16px;color:var(--accent);line-height:1.2;}
.bubble-sub{font-size:13px;color:var(--ink-light);font-weight:500;}
.settings-btn{width:44px;height:44px;border-radius:50%;background:var(--surface);border:none;box-shadow:var(--shadow);display:flex;justify-content:center;align-items:center;cursor:pointer;color:var(--accent);transition:transform .1s;}
.settings-btn:active{transform:scale(0.95);}
.settings-btn svg{width:22px;height:22px;stroke-width:2.5;}

.pink-board{background:var(--bg-pink);border-radius:32px 32px 0 0;padding:24px 20px 40px;min-height:100%;}

.trip-header{margin-bottom:20px;}
.trip-title{font-size:22px;font-weight:800;color:var(--ink-dark);display:flex;align-items:center;gap:8px;cursor:pointer;}
.trip-sub{font-size:13px;color:var(--ink-dark);font-weight:500;margin-top:4px;opacity:0.8;}

.sec-card{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow);padding:20px;margin-bottom:16px;animation:slide-up .3s ease;}
.settings-card{background:var(--surface);border-radius:16px;padding:16px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,0.04);}

.pill-btn:active{background:var(--accent-light);}
.btn-main{background:var(--accent);color:#fff;border:none;padding:14px 20px;border-radius:var(--rs);font-weight:700;font-size:16px;width:100%;cursor:pointer;font-family:'Kanit';}

const RATES = { THB: 35, USD: 1, EUR: 0.92, JPY: 150, SGD: 1.34, GBP: 0.79, CNY: 7.2, KRW: 1330, AUD: 1.52, MYR: 4.7 };

const CURRENCIES = [
  {code:'THB',sym:'฿',name:'บาทไทย / Thai Baht'},
  {code:'USD',sym:'$',name:'ดอลลาร์สหรัฐ / US Dollar'},
  {code:'EUR',sym:'€',name:'ยูโร / Euro'},
  {code:'JPY',sym:'¥',name:'เยน / Japanese Yen'},
  {code:'SGD',sym:'S$',name:'ดอลลาร์สิงคโปร์ / SGD'},
  {code:'GBP',sym:'£',name:'ปอนด์ / British Pound'},
  {code:'CNY',sym:'¥',name:'หยวน / Chinese Yuan'},
  {code:'KRW',sym:'₩',name:'วอน / Korean Won'},
  {code:'AUD',sym:'A$',name:'ดอลลาร์ออสเตรเลีย / AUD'},
  {code:'MYR',sym:'RM',name:'ริงกิต / Malaysian Ringgit'}
];

const CATEGORIES = ['Food', 'Accommodation', 'Transport', 'Ticket', 'Shopping', 'Settlement', 'Other'];

const CAT_COLORS = {
  'Food':          { bg:'#FFED9E', text:'#111111' },
  'Accommodation': { bg:'#A6CFF2', text:'#111111' },
  'Transport':     { bg:'#426BC2', text:'#FFFFFF' },
  'Ticket':        { bg:'#F2C0CA', text:'#111111' },
  'Shopping':      { bg:'#4A9166', text:'#FFFFFF' },
  'Settlement':    { bg:'#EAF5F0', text:'#2E7D5E' },
  'Other':         { bg:'#F0F0F0', text:'#111111' }
};

const getCur = code => CURRENCIES.find(x=>x.code===code)||CURRENCIES[0];
const fmtAmt = (n,code) => {
  const c = getCur(code);
  const dec = (code==='JPY'||code==='KRW') ? 0 : 2;
  return c.sym + Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:dec,maximumFractionDigits:dec});
};

// round to 2 decimal places using integer arithmetic to avoid float drift
const r2 = n => Math.round(n * 100) / 100;

/**
 * makeSplits — หารยอดให้ครบ 2 ทศนิยมโดยไม่มีเศษตกหล่น
 * - หารฐาน: floor ทุกคน
 * - เศษที่เหลือ (ทศนิยม 2 หลัก) ยกให้คนแรก (มักเป็น 0.01 บาท)
 * ผลรวม splits จะเท่ากับ amount เสมอ
 */
function makeSplits(amount, members) {
  if (!members.length) return {};
  const totalCents = Math.round(amount * 100);           // ทำงานด้วยสตางค์เต็มจำนวน
  const baseCents  = Math.floor(totalCents / members.length);
  const extraCents = totalCents - baseCents * members.length; // เศษที่เหลือ (0 ถึง n-1 สตางค์)
  const splits = {};
  members.forEach((m, i) => {
    // คนแรก i===0 รับเศษที่เหลือทั้งหมด (สูงสุด n-1 สตางค์ ≈ ไม่กี่ตังค์)
    splits[m] = r2((baseCents + (i === 0 ? extraCents : 0)) / 100);
  });
  return splits;
}

/**
 * calcBal — คำนวณ paid / owe / net ด้วย r2 ทุก step
 * net = เงินที่จ่ายแทนคนอื่นไป (บวก = คนอื่นค้างคุณ, ลบ = คุณค้างคนอื่น)
 */
function calcBal(members, expenses, displayCurrency) {
  const paid = {}, owe = {}, net = {};
  members.forEach(m => { paid[m] = 0; owe[m] = 0; net[m] = 0; });

  expenses.forEach(e => {
    if ((e.currency || 'THB') !== displayCurrency) return;
    // สะสมยอดจ่าย
    if (paid[e.payer] !== undefined) paid[e.payer] = r2(paid[e.payer] + e.amount);
    // สะสมยอดที่ต้องจ่ายคืน
    Object.entries(e.splits).forEach(([n, v]) => {
      if (owe[n] !== undefined) owe[n] = r2(owe[n] + v);
    });
  });

  members.forEach(m => { net[m] = r2((paid[m] || 0) - (owe[m] || 0)); });
  return { paid, owe, net };
}

/**
 * calcSettle — หาลำดับโอนเงินที่น้อยที่สุด
 * ใช้ epsilon = 0.005 (ครึ่งสตางค์) เพื่อตัดเศษที่เกิดจากการแปลงสกุลเงิน
 */
function calcSettle(net) {
  const EPS = 0.005;
  const cr = [], db = [];
  Object.entries(net).forEach(([n, v]) => {
    const val = r2(v);
    if (val >  EPS) cr.push({ n, a: val });
    if (val < -EPS) db.push({ n, a: -val });
  });
  cr.sort((a, b) => b.a - a.a);
  db.sort((a, b) => b.a - a.a);

  const result = [];
  let ci = 0, di = 0;
  while (ci < cr.length && di < db.length) {
    const amt = r2(Math.min(cr[ci].a, db[di].a));
    if (amt >= EPS) result.push({ from: db[di].n, to: cr[ci].n, amount: amt });
    cr[ci].a = r2(cr[ci].a - amt);
    db[di].a = r2(db[di].a - amt);
    if (cr[ci].a < EPS) ci++;
    if (db[di].a < EPS) di++;
  }
  return result;
}

function InlineEdit({ text, onSave, className, placeholder, isTitle, style }) {
  const [isEditing, setIsEditing] = useState(false);
  const [val, setVal] = useState(text);
  const inputRef = useRef(null);

  useEffect(() => { if(isEditing) inputRef.current?.focus(); }, [isEditing]);

  const handleSave = () => { setIsEditing(false); if(val.trim()) onSave(val.trim()); else setVal(text); };

  if (isEditing) {
    return <input ref={inputRef} value={val} onChange={e=>setVal(e.target.value)} onBlur={handleSave} onKeyDown={e=>{if(e.key==='Enter')handleSave()}} className="inline-input" style={{fontSize:isTitle?22:16,fontWeight:isTitle?800:600,...style}}/>
  }
  return <div onClick={()=>{setVal(text); setIsEditing(true);}} className={className} style={{cursor:'text',...style}}>{text || placeholder} <span style={{opacity:0.5}}>{I.edit}</span></div>
}

function useToast(){
  const [t,setT]=useState(null);
  return [t, msg=>{setT(msg);setTimeout(()=>setT(null),2000)}];
}

// DEBT BANNER — แสดงยอดค้างจ่ายของ myName
// ═══════════════════════════════════════════════════
function DebtBanner({data, myName, onSelectMember, t}){
  const {members, expenses, displayCurrency} = data;
  if(!myName) return null;

  // จับคู่ชื่อแบบ case-insensitive — หาชื่อจริงใน members ที่ตรงกับที่กรอก
  const resolvedName = members.find(m => m.toLowerCase() === myName.trim().toLowerCase());
  if(!resolvedName) return null;

  // หายอดค้างจาก real expenses เท่านั้น
  const realExp = expenses.filter(e=>e.category!=='Settlement');
  const {net: grossNet} = calcBal(members, realExp, displayCurrency);
  const settles = calcSettle(grossNet).filter(s => s.from === resolvedName);
  if(settles.length === 0) return null;

  const totalOwed = r2(settles.reduce((s,x)=>s+x.amount, 0));

  return (
    <div className="debt-banner">
      {/* Header */}
      <div style={{marginBottom:8}}>
        <div style={{fontSize:13,fontWeight:700,color:'rgba(255,255,255,0.75)',marginBottom:2}}>{t.debtAlertSub}</div>
        <div style={{fontSize:22,fontWeight:900,color:'#fff'}}>{t.debtAlertTitle(fmtAmt(totalOwed, displayCurrency))}</div>
      </div>

      {/* Each creditor row */}
      {settles.map((s,i)=>(
        <div key={i} className="debt-row">
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:34,height:34,borderRadius:8,background:'rgba(255,255,255,0.15)',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,fontSize:15,color:'#fff'}}>
              {s.to[0].toUpperCase()}
            </div>
            <div>
              <div style={{fontWeight:700,fontSize:15,color:'#fff'}}>{s.to}</div>
              <div style={{fontSize:12,color:'rgba(255,255,255,0.65)'}}>→ {t.payTo}</div>
            </div>
          </div>
          <div style={{fontWeight:900,fontSize:17,color:'#fff'}}>{fmtAmt(s.amount, displayCurrency)}</div>
        </div>
      ))}

      {/* Pay Now button */}
      <button className="pay-now-btn" onClick={()=>onSelectMember(resolvedName)}>
        {t.payNow}
      </button>
    </div>
  );
}

// ADD / EDIT EXPENSE TAB
// ═══════════════════════════════════════════════════
function AddTab({data, upd, toast, goBack, editingExp, t}){
  const {members, displayCurrency} = data;
  const isEdit = !!editingExp;

  const [desc, setDesc] = useState(isEdit?editingExp.desc:'');
  const [amt,  setAmt]  = useState(isEdit?editingExp.amount:'');
  const [cat,  setCat]  = useState(isEdit?editingExp.category:'Food');
  const [payer,setPayer] = useState(isEdit?editingExp.payer:(members[0]||''));
  const [note, setNote] = useState(isEdit?(editingExp.note||''):'');
  const [sel,  setSel]  = useState({});

  useEffect(()=>{
    const s={};
    if(isEdit){ members.forEach(m=>{ s[m]=!!editingExp.splits[m]; }); }
    else { members.forEach(m=>{ s[m]=true; }); }
    setSel(s);
  },[members, isEdit]);

  if(members.length<2) return <div className="app-container"><div style={{marginTop:40,textAlign:'center'}}>{t.needMinMembers}</div></div>;

  const submit = () => {
    const active = members.filter(m=>sel[m]);
    const a = parseFloat(amt);
    if(!desc.trim()) return toast(t.needDetail);
    if(!a || a<=0)   return toast(t.needAmount);
    if(!payer)       return toast(t.needPayer);
    if(active.length===0) return toast(t.needSplit);

    // ใช้ makeSplits เพื่อการหารที่แม่นยำ (ผลรวม splits = amount เสมอ)
    const roundedAmt = r2(a);
    const splits = makeSplits(roundedAmt, active);

    const expObj = { id:isEdit?editingExp.id:Date.now(), desc:desc.trim(), amount:roundedAmt, currency:displayCurrency, category:cat, payer, splits, note:note.trim(), date:today() };

    if(isEdit){
      upd(d=>{ d.expenses=d.expenses.map(e=>e.id===expObj.id?expObj:e); return d; });
      toast(t.edited);
    } else {
      upd(d=>{ d.expenses=[expObj,...d.expenses]; return d; });
      toast(t.saved);
    }
    goBack();
  };

  const del = () => {
    if(confirm(t.confirmDelete)){
      upd(d=>{d.expenses=d.expenses.filter(e=>e.id!==editingExp.id); return d;});
      toast(t.deleted); goBack();
    }
  };

  return <div className="app-container" style={{background:'var(--bg-pink)'}}>
    <div className="top-header" style={{alignItems:'center', background:'transparent'}}>
      <button className="pill-btn" style={{display:'flex',gap:6,alignItems:'center'}} onClick={goBack}>{I.back} {t.back}</button>
      <div style={{fontWeight:800, fontSize:18, color:'var(--ink-dark)'}}>{isEdit?t.editTransaction:t.addTransaction}</div>
      <div style={{width:80}}></div>
    </div>

    <div style={{padding:'0 20px 40px'}}>
      <div className="sec-card">
        <center><PlaceholderImage size={60} rounded="10px" style={{marginBottom:16}}/></center>

        <div className="lbl">{t.category}</div>
        <select value={cat} onChange={e=>setCat(e.target.value)} style={{marginBottom:16}}>
          {CATEGORIES.filter(c=>c!=='Settlement').map(c=><option key={c} value={c}>{c}</option>)}
        </select>

        <div className="lbl">{t.detail}</div>
        <input placeholder={t.detailPlaceholder} value={desc} onChange={e=>setDesc(e.target.value)} style={{marginBottom:16}}/>

        <div className="lbl">{t.amount(displayCurrency)}</div>
        <input type="number" inputMode="decimal" placeholder="0.00" value={amt} onChange={e=>setAmt(e.target.value)} style={{marginBottom:16}}/>

        <div className="lbl">{t.note}</div>
        <textarea rows="2" placeholder={t.notePlaceholder} value={note} onChange={e=>setNote(e.target.value)} style={{marginBottom:16,resize:'none'}}/>

        <div className="lbl">{t.whoPayQuestion}</div>
        <select value={payer} onChange={e=>setPayer(e.target.value)} style={{marginBottom:24}}>
          {members.map(m=><option key={m} value={m}>{m}</option>)}
        </select>

        <div className="lbl">{t.splitWithQuestion}</div>
        <div className="split-chip-group">
          {members.map(m=>(
            <div key={m} onClick={()=>setSel(s=>({...s,[m]:!s[m]}))} className={`split-chip ${sel[m]?'on':'off'}`}>
              {sel[m] && <HandCoinIcon/>}
              {m}
            </div>
          ))}
        </div>

        <button className="btn-main" onClick={submit}>{t.save}</button>
        {isEdit && <button className="pill-btn" style={{width:'100%',marginTop:12,color:'white',background:'#A65368',border:'none'}} onClick={del}>{t.delete}</button>}
      </div>
    </div>
  </div>;
}

// MEMBER DETAIL
// ═══════════════════════════════════════════════════
function MemberDetail({member, data, upd, toast, goBack, t}){
  const {members, expenses, displayCurrency} = data;

  const realExpenses = expenses.filter(e=>e.category!=='Settlement');
  const {net: grossNet} = calcBal(members, realExpenses, displayCurrency);
  const grossSettles = calcSettle(grossNet).filter(s=>s.from===member||s.to===member);

  const {net: actualNet} = calcBal(members, expenses, displayCurrency);
  const currentN = actualNet[member] || 0;

  const togglePaid = (s) => {
    const related = expenses.filter(e=>e.category==='Settlement'&&e.currency===displayCurrency&&e.payer===s.from&&e.splits[s.to]);
    const paidAmt = related.reduce((sum,e)=>sum+(e.splits[s.to]||0),0);
    const isPaid = paidAmt >= (s.amount - 0.01);

    if(isPaid){
      upd(d=>{d.expenses=d.expenses.filter(e=>!(e.category==='Settlement'&&e.currency===displayCurrency&&e.payer===s.from&&e.splits[s.to])); return d;});
      toast(t.settleCancel);
    } else {
      upd(d=>{
        d.expenses.push({id:Date.now(),desc:`${s.from} ➔ ${s.to}`,amount:s.amount,currency:displayCurrency,category:'Settlement',payer:s.from,splits:{[s.to]:s.amount},date:today(),note:''});
        return d;
      });
      toast(t.settleSaved);
    }
  };

  return <div className="app-container" style={{background:'var(--bg-main)',zIndex:200,position:'absolute',top:0,left:0,right:0,bottom:0}}>
    <div className="top-header" style={{alignItems:'center'}}>
      <button className="pill-btn" style={{display:'flex',gap:6,alignItems:'center'}} onClick={goBack}>{I.back} {t.back}</button>
      <div style={{width:80}}></div>
    </div>
    <div style={{padding:'0 20px 20px'}}>
      <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:24}}>
        <div className="av-sq" style={{width:60,height:60,fontSize:24,background:'var(--surface)',border:'2px solid var(--accent)'}}>{member[0]}</div>
        <div>
          <div style={{fontSize:24,fontWeight:800,color:'var(--ink-dark)'}}>{member}</div>
          <div style={{fontSize:14,fontWeight:600,color:currentN>0.01?'var(--green)':currentN<-0.01?'var(--accent)':'var(--ink-light)'}}>
            {currentN>0.01 ? t.friendOwes(fmtAmt(currentN, displayCurrency))
              : currentN<-0.01 ? t.owesFriend(fmtAmt(-currentN, displayCurrency))
              : t.allClear}
          </div>
        </div>
      </div>

      {grossSettles.length>0 && (
        <div className="sec-card" style={{background:'var(--bg-pink)'}}>
          <div className="lbl" style={{color:'var(--ink-dark)',fontSize:14,marginBottom:16}}>
            {t.settleHeader} ({displayCurrency})
          </div>
          {grossSettles.map((s,i)=>{
            const isFrom = s.from===member;
            const related = expenses.filter(e=>e.category==='Settlement'&&e.currency===displayCurrency&&e.payer===s.from&&e.splits[s.to]);
            const paidAmt = related.reduce((sum,e)=>sum+(e.splits[s.to]||0),0);
            const isPaid = paidAmt >= (s.amount - 0.01);

            return <div key={i} style={{background:'var(--surface)',padding:'16px',borderRadius:16,marginBottom:12,border:isPaid?'2px solid var(--accent)':'2px solid transparent'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                <div style={{fontSize:14,fontWeight:600,display:'flex',alignItems:'center',gap:6}}>
                  {isFrom
                    ? <span style={{color:'var(--ink-dark)',display:'flex',alignItems:'center',gap:6}}>{t.payTo} <NewArrowIcon color="var(--ink-dark)"/> {s.to}</span>
                    : <span style={{color:'var(--ink-dark)',display:'flex',alignItems:'center',gap:6}}>{t.receiveFrom} <NewArrowIcon color="var(--ink-dark)"/> {s.from}</span>
                  }
                </div>
                <div style={{fontSize:18,fontWeight:800,color:'var(--ink-dark)'}}>{fmtAmt(s.amount, displayCurrency)}</div>
              </div>
              <div className={`split-chip ${isPaid?'on':'off'}`} style={{width:'100%',border:isPaid?'none':'1.5px solid rgba(119,5,35,0.1)'}} onClick={()=>togglePaid(s)}>
                {isPaid && <HandCoinIcon/>}
                {isPaid
                  ? (isFrom ? t.alreadySent : t.alreadyReceived)
                  : (isFrom ? t.tapWhenSent : t.tapWhenReceived)
                }
              </div>
            </div>;
          })}
        </div>
      )}
    </div>
  </div>;
}

// ═══════════════════════════════════════════════════
// SETTINGS TAB
// ═══════════════════════════════════════════════════
function SettingsTab({data, upd, goBack, myName, onChangeName, toast, lang, setLang, t}){
  const {displayCurrency} = data;

  const handleCurChange = (newCur) => {
    if(newCur===displayCurrency) return;
    if(confirm(t.convertConfirm(newCur))){
      const rateFrom = RATES[displayCurrency]||1;
      const rateTo   = RATES[newCur]||1;
      upd(d=>{
        d.expenses = d.expenses.map(exp=>{
          const convert = amt => (amt/rateFrom)*rateTo;
          const newSplits={};
          Object.keys(exp.splits).forEach(k=>newSplits[k]=convert(exp.splits[k]));
          return {...exp, currency:newCur, amount:convert(exp.amount), splits:newSplits};
        });
        d.displayCurrency = newCur;
        return d;
      });
      toast(t.converted(newCur));
    } else {
      upd(d=>{ d.displayCurrency=newCur; return d; });
    }
  };

  const handleLangChange = (newLang) => {
    setLang(newLang);
    localStorage.setItem(LANG_KEY, newLang);
  };

  return <div className="app-container" style={{background:'var(--bg-pink)',zIndex:200,position:'absolute',top:0,left:0,right:0,bottom:0}}>
    <div className="top-header" style={{alignItems:'center', background:'transparent'}}>
      <button className="pill-btn" style={{display:'flex',gap:6,alignItems:'center'}} onClick={goBack}>{I.back} {t.back}</button>
      <div style={{fontWeight:800,fontSize:20,color:'var(--ink-dark)'}}>{t.settings}</div>
      <div style={{width:80}}></div>
    </div>

    <div style={{padding:'0 20px 40px'}}>

      {/* Language Toggle */}
      <div className="settings-card">
        <div className="lbl" style={{color:'var(--ink-dark)',fontSize:14,marginBottom:12}}>{t.language}</div>
        <div className="lang-toggle">
          <button className={`lang-btn ${lang==='th'?'active':''}`} onClick={()=>handleLangChange('th')}>{T.th.langTH}</button>
          <button className={`lang-btn ${lang==='en'?'active':''}`} onClick={()=>handleLangChange('en')}>{T.en.langEN}</button>
        </div>
      </div>

      {/* My Name */}
      <div className="settings-card">
        <div className="lbl" style={{color:'var(--ink-dark)',fontSize:14,display:'flex',alignItems:'center',gap:6}}>{t.myName}</div>
        <div style={{display:'flex',alignItems:'center',gap:12,marginTop:10}}>
          <div className="av-sq" style={{background:'#EAF5F0',color:'#2E7D5E'}}>{(myName||'?')[0].toUpperCase()}</div>
          <div style={{flex:1}}>
            <InlineEdit text={myName} onSave={onChangeName} placeholder={t.myNamePlaceholder} className="bubble-hi" style={{color:'var(--ink-dark)'}}/>
            <div style={{fontSize:12,color:'var(--ink-light)'}}>{t.myNameSub}</div>
          </div>
        </div>
      </div>

      {/* Currency */}
      <div className="settings-card">
        <div className="lbl" style={{color:'var(--ink-dark)',fontSize:14}}>{t.currency}</div>
        <div style={{fontSize:12,color:'var(--ink-light)',marginBottom:12}}>{t.currencySub}</div>
        <div className="curr-grid">
          {CURRENCIES.map(c=>(
            <div key={c.code} className={`curr-item ${displayCurrency===c.code?'active':''}`} onClick={()=>handleCurChange(c.code)}>
              <div style={{fontWeight:800,fontSize:16,width:24}}>{c.sym}</div>
              <div>
                <div style={{fontWeight:700,fontSize:13,color:'var(--ink-dark)'}}>{c.code}</div>
                <div style={{fontSize:10,color:'var(--ink-light)'}}>{c.name}</div>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* Danger Zone */}
      <div className="settings-card">
        <div className="lbl" style={{color:'var(--ink-dark)',fontSize:14}}>{t.dangerZone}</div>
        <button className="pill-btn" style={{width:'100%',padding:'12px',marginTop:10,background:'#F9E8EC',color:'#770523',border:'none'}}
          onClick={()=>{ if(confirm(t.resetConfirm)){ upd(()=>initData()); goBack(); } }}>
          {t.resetBtn}
        </button>
      </div>

    </div>
  </div>;
}

// ═══════════════════════════════════════════════════
// APP ROOT
// ═══════════════════════════════════════════════════
function App(){
  const [data,   setData]  = useState(loadData);
  const [tab,    setTab]   = useState('home');
  const [memberDetail, setMemberDetail] = useState(null);
  const [editingExp,   setEditingExp]   = useState(null);
  const [myName, setMyName] = useState(()=>localStorage.getItem(MY_KEY)||'');
  const [lang,   setLang]   = useState(()=>localStorage.getItem(LANG_KEY)||'th');
  const [toast,  showToast] = useToast();

  // Active translations
  const t = T[lang] || T['th'];

  const syncData = useCallback(() => {
    if(!WEB_APP_URL) return;
    showToast(t.syncing);
    fetch(WEB_APP_URL)
      .then(r=>r.json())
      .then(d=>{ if(d&&d.members){ setData(d); showToast(t.syncDone); } })
      .catch(()=>showToast(t.syncFail));
  }, [t]);

  useEffect(()=>persist(data),[data]);
  useEffect(()=>localStorage.setItem(MY_KEY, myName),[myName]);
  useEffect(()=>localStorage.setItem(LANG_KEY, lang),[lang]);

  const upd = fn => {
    setData(prev=>{
      const nd = fn({...prev});
      if(WEB_APP_URL){
        fetch(WEB_APP_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(nd)})
          .catch(()=>showToast(t.cloudFail));
      }
      return nd;
    });
  };

  return <div id="root">
    {tab==='home' && !memberDetail && (
      <HomeTab data={data} upd={upd} toast={showToast} myName={myName} onChangeName={setMyName} setTab={setTab} onSelectMember={setMemberDetail} syncData={syncData} t={t}/>
    )}
    {tab==='add' && (
      <AddTab data={data} upd={upd} toast={showToast} goBack={()=>setTab('home')} editingExp={null} t={t}/>
    )}
    {tab==='edit' && (
      <AddTab data={data} upd={upd} toast={showToast} goBack={()=>{setTab('list'); setEditingExp(null);}} editingExp={editingExp} t={t}/>
    )}
    {tab==='list' && (
      <ListTab data={data} setEditingExp={e=>{setEditingExp(e); setTab('edit');}} t={t}/>
    )}

    {memberDetail && (
      <MemberDetail member={memberDetail} data={data} upd={upd} toast={showToast} goBack={()=>setMemberDetail(null)} t={t}/>
    )}
    {tab==='settings' && (
      <SettingsTab data={data} upd={upd} goBack={()=>setTab('home')} myName={myName} onChangeName={setMyName} toast={showToast} lang={lang} setLang={setLang} t={t}/>
    )}

    {toast && <div className="toast">{toast}</div>}

    {(tab==='home'||tab==='list') && !memberDetail && (
      <nav className="bottom-nav">
        <button className={`nav-item ${tab==='home'?'active':''}`} onClick={()=>setTab('home')}>
          {I.home}<span>{t.navHome}</span>
        </button>

        <div className="fab-container">
          <button className="fab-btn" onClick={()=>{
            if(data.members.length<2){ showToast(t.needMoreMembers); }
            else { setTab('add'); }
          }}>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
          </button>
        </div>

        <button className={`nav-item ${tab==='list'?'active':''}`} onClick={()=>setTab('list')}>
          {I.list}<span>{t.navTransactions}</span>
        </button>
      </nav>
    )}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
